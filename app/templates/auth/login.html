<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Iniciar Sesión - Docente Apacuana</title>
    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Config -->
    <script
        id="tailwind-config">tailwind.config = { darkMode: "class", theme: { extend: { colors: { "on-primary": "#003350", "on-primary-container": "#002c46", "on-primary-fixed": "#001e31", background: "#111417", "secondary-fixed-dim": "#b1c9e1", primary: "#90cdff", "on-surface-variant": "#c0c7d0", "surface-bright": "#37393d", surface: "#111417", "surface-container-highest": "#323538", "surface-container-low": "#191c1f", "on-tertiary-fixed-variant": "#624000", "surface-container-lowest": "#0c0e11", "surface-tint": "#90cdff", "on-error-container": "#ffdad6", "on-tertiary": "#452b00", "primary-container": "#5497c9", "on-error": "#690005", "tertiary-container": "#bd862e", "error-container": "#93000a", "on-tertiary-container": "#3c2500", error: "#ffb4ab", "on-surface": "#e1e2e7", "surface-container": "#1d2023", "on-secondary": "#1b3345", "on-primary-fixed-variant": "#004b72", "on-secondary-fixed-variant": "#32495c", tertiary: "#fabb5e", "tertiary-fixed-dim": "#fabb5e", "outline-variant": "#40484f", "primary-fixed-dim": "#90cdff", "inverse-surface": "#e1e2e7", "inverse-primary": "#116493", "primary-fixed": "#cce5ff", "surface-dim": "#111417", outline: "#8a919a", "secondary-container": "#354b5f", "on-secondary-container": "#a3bbd2", "surface-variant": "#323538", "tertiary-fixed": "#ffddb2", secondary: "#b1c9e1", "secondary-fixed": "#cde5fd", "inverse-on-surface": "#2e3134", "on-secondary-fixed": "#031d2f", "on-tertiary-fixed": "#291800", "on-background": "#e1e2e7", "surface-container-high": "#282a2e" }, borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" }, spacing: { gutter: "24px", "margin-desktop": "48px", unit: "8px", "margin-mobile": "16px", "container-max": "1280px" }, fontFamily: { "headline-lg": ["Inter"], "label-md": ["Inter"], "body-md": ["Inter"], "headline-md": ["Inter"], display: ["Inter"], "body-lg": ["Inter"], headline: ["Inter"], body: ["Inter"], label: ["Inter"] }, fontSize: { "headline-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }], "label-md": ["14px", { lineHeight: "1.4", letterSpacing: "0.05em", fontWeight: "500" }], "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }], "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }], display: ["64px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }], "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }] } } } };</script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>

<body
    class="bg-transparent min-h-screen flex items-center justify-center relative overflow-hidden selection:bg-primary/30 selection:text-primary">
    <!-- Background Video for Desktop -->
    <video autoplay class="fixed inset-0 w-full h-full object-cover z-0 pointer-events-none hidden md:block" loop muted playsinline>
        <source src="{{ url_for('static', filename='videoplayback.mp4') }}" type="video/mp4">
    </video>

    <!-- Background Video for Mobile -->
    <video autoplay class="fixed inset-0 w-full h-full object-cover z-0 pointer-events-none block md:hidden" loop muted playsinline>
        <source src="{{ url_for('static', filename='Vertical.mp4') }}" type="video/mp4">
    </video>

    <!-- Dark overlay to ensure text readability -->
    <div class="fixed inset-0 bg-black/40 md:bg-black/50 z-0 pointer-events-none"></div>

    <!-- Ambient Glows -->
    <div
        class="fixed bottom-0 left-0 right-0 h-[40vh] bg-gradient-to-t from-white/30 to-transparent z-0 pointer-events-none">
    </div>

    <!-- Main Content Canvas -->
    <main class="w-full max-w-[480px] p-6 md:p-gutter relative z-10 animate-fade-in flex flex-col justify-center h-screen md:h-auto md:block">
        <!-- Glassmorphism Login Card -->
        <div
            class="bg-black/20 md:bg-[rgba(15,18,23,0.65)] backdrop-blur-xl md:backdrop-blur-[30px] border border-white/20 md:border-white/10 md:border-b-white/30 rounded-3xl md:rounded-2xl p-6 md:p-[40px] shadow-[0_8px_32px_rgba(0,0,0,0.5)] md:shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative overflow-hidden">
            <!-- White accent at the bottom of the card -->
            <div
                class="absolute bottom-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-white/50 to-transparent">
            </div>
            <!-- Header -->
            <div class="mb-4 md:mb-8 text-center relative z-10">
                <div class="flex justify-center mb-0 md:mb-6">
                    <img src="{{ url_for('static', filename='apacuana-logo.png') }}" alt="Logo Apacuana" class="h-16 md:h-24 w-auto object-contain">
                </div>
                <h1 class="hidden md:block font-headline-lg text-headline-lg text-on-background mb-2">Portal Docente</h1>
                <p class="hidden md:block font-body-md text-body-md text-on-surface-variant">Ingresa tus credenciales para acceder al
                    sistema.</p>
            </div>

            {% if error %}
            <div
                class="mb-6 flex items-center gap-3 bg-error-container/20 border border-error/30 text-error text-sm rounded-lg px-4 py-3 animate-fade-in relative z-10">
                <span class="material-symbols-outlined text-lg">error</span>
                {{ error }}
            </div>
            {% endif %}

            <!-- Form -->
            <form action="{{ url_for('auth.login') }}" class="relative z-10" method="POST">
                <!-- Username Field -->
                <div class="mb-6">
                    <label class="block font-label-md text-label-md text-white/90 mb-2 drop-shadow-md" for="username">Correo Electrónico</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/70 text-xl">mail</span>
                        <input
                            class="w-full bg-white/10 md:bg-[rgba(0,0,0,0.4)] border border-white/20 md:border-0 md:border-b-2 md:border-white/10 focus:border-white focus:ring-0 text-white font-body-md text-body-md pl-12 pr-4 py-3.5 rounded-xl md:rounded-t-lg transition-all placeholder:text-white/50 backdrop-blur-sm shadow-inner"
                            id="username" name="username" placeholder="tu.correo@ejemplo.com" required type="email" />
                    </div>
                </div>
                <!-- Password Field -->
                <div class="mb-8">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block font-label-md text-label-md text-white/90 drop-shadow-md"
                            for="password">Contraseña</label>
                    </div>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/70 text-xl">lock</span>
                        <input
                            class="w-full bg-white/10 md:bg-[rgba(0,0,0,0.4)] border border-white/20 md:border-0 md:border-b-2 md:border-white/10 focus:border-white focus:ring-0 text-white font-body-md text-body-md pl-12 pr-12 py-3.5 rounded-xl md:rounded-t-lg transition-all placeholder:text-white/50 backdrop-blur-sm shadow-inner"
                            id="password" name="password" placeholder="••••••••" required type="password" />
                        <button id="toggle-password"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white transition-colors focus:outline-none"
                            type="button">
                            <span class="material-symbols-outlined text-xl" id="eye-icon">visibility_off</span>
                        </button>
                    </div>
                </div>
                <!-- Submit Button -->
                <button id="submit-btn"
                    class="w-full bg-white/20 hover:bg-white/30 md:bg-primary md:text-on-primary text-white border border-white/30 font-bold text-label-md py-4 rounded-xl shadow-[0_0_15px_rgba(255,255,255,0.1)] hover:shadow-[0_0_25px_rgba(255,255,255,0.3)] backdrop-blur-md transition-all duration-300 transform active:scale-[0.98] flex items-center justify-center gap-2"
                    type="submit">
                    <span>Iniciar Sesión</span>
                </button>
            </form>
            <!-- Footer Links -->
            <div class="mt-8 text-center relative z-10 border-t border-white/20 md:border-white/5 pt-6">
                <p class="font-body-md text-sm text-white/70 drop-shadow-sm">
                    U.E.N Apacuana &middot; Portal Docente
                </p>
            </div>
        </div>
    </main>
    <script>
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('toggle-password');
        const eyeIcon = document.getElementById('eye-icon');

        // Bloquear espacios en el campo de contraseña
        passwordInput.addEventListener('keydown', function (e) {
            if (e.key === ' ') e.preventDefault();
        });
        passwordInput.addEventListener('input', function () {
            if (this.value.includes(' ')) {
                this.value = this.value.replace(/ /g, '');
            }
        });
        passwordInput.addEventListener('paste', function (e) {
            e.preventDefault();
            const pasted = (e.clipboardData || window.clipboardData).getData('text');
            this.value += pasted.replace(/ /g, '');
        });

        toggleButton.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.textContent = type === 'password' ? 'visibility_off' : 'visibility';
        });

        document.querySelector('form').addEventListener('submit', function (e) {
            const username = document.getElementById('username').value.trim();
            const password = passwordInput.value;
            if (!username || !password) {
                e.preventDefault();
                return;
            }
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> <span>Verificando...</span>';
        });
    </script>
</body>

</html>
